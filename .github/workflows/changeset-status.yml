name: Changeset status

on:
  pull_request:
    branches:
      - development
      - main

jobs:
  changeset-status:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx changeset status
