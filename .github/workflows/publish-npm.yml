name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Read package name and version
        id: pkg
        shell: bash
        run: |
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check whether version already exists on npm
        id: npm_check
        shell: bash
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        shell: bash
        run: |
          if [ "${{ steps.npm_check.outputs.exists }}" = "true" ]; then
            echo "Package version already exists on npm. Skipped publish." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Published ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} to npm." >> "$GITHUB_STEP_SUMMARY"
          fi
