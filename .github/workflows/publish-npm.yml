name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Read package info
        id: pkg
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "repo_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Read latest npm version
        id: npm_pkg
        shell: bash
        run: |
          VERSION="$(npm view "${{ steps.pkg.outputs.name }}" version 2>/dev/null || echo "0.0.0")"
          echo "npm_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Decide publish version
        id: decide
        shell: bash
        run: |
          node - <<'EOF'
          const fs = require('fs');

          const repo = process.env.REPO_VERSION;
          const npmv = process.env.NPM_VERSION;
          const out = process.env.GITHUB_OUTPUT;

          function parse(v) {
            const parts = v.split('.').map(Number);
            if (parts.length !== 3 || parts.some(n => Number.isNaN(n))) {
              throw new Error(`Invalid semver: ${v}`);
            }
            return parts;
          }

          function cmp(a, b) {
            const pa = parse(a);
            const pb = parse(b);
            for (let i = 0; i < 3; i++) {
              if (pa[i] > pb[i]) return 1;
              if (pa[i] < pb[i]) return -1;
            }
            return 0;
          }

          function nextMinor(v) {
            const [maj, min] = parse(v);
            return `${maj}.${min + 1}.0`;
          }

          const comparison = cmp(repo, npmv);

          let manualVersion = 'false';
          let publishVersion;

          if (comparison > 0) {
            manualVersion = 'true';
            publishVersion = repo;
          } else {
            publishVersion = nextMinor(npmv);
          }

          fs.appendFileSync(out, `manual_version=${manualVersion}\n`);
          fs.appendFileSync(out, `publish_version=${publishVersion}\n`);
          EOF
        env:
          REPO_VERSION: ${{ steps.pkg.outputs.repo_version }}
          NPM_VERSION: ${{ steps.npm_pkg.outputs.npm_version }}

      - name: Set publish version locally
        shell: bash
        run: |
          npm version "${{ steps.decide.outputs.publish_version }}" --no-git-tag-version --allow-same-version

      - name: Publish with Trusted Publishing
        run: npm publish

      - name: Summary
        shell: bash
        run: |
          if [ "${{ steps.decide.outputs.manual_version }}" = "true" ]; then
            echo "Published manual version: ${{ steps.decide.outputs.publish_version }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Auto-bumped minor and published: ${{ steps.decide.outputs.publish_version }}" >> "$GITHUB_STEP_SUMMARY"
          fi