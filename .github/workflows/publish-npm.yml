name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Get current repo version
      - name: Read repo version
        id: repo_version
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      # Get latest npm version
      - name: Read npm version
        id: npm_version
        run: |
          VERSION=$(npm view $(node -p "require('./package.json').name") version || echo "0.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Decide version bump
      - name: Decide version
        id: decide
        run: |
          REPO=${{ steps.repo_version.outputs.version }}
          NPM=${{ steps.npm_version.outputs.version }}

          if [ "$REPO" != "$NPM" ]; then
            echo "use_repo_version=true" >> $GITHUB_OUTPUT
          else
            echo "use_repo_version=false" >> $GITHUB_OUTPUT
          fi

      # Auto bump minor ONLY if user didn't change version
      - name: Bump minor
        if: steps.decide.outputs.use_repo_version == 'false'
        run: |
          npm version minor --no-git-tag-version

      # Publish
      - name: Publish
        run: npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Commit version back (only if auto bumped)
      - name: Commit version bump
        if: steps.decide.outputs.use_repo_version == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package.json package-lock.json || true
          git commit -m "chore: auto bump minor version"
          git push