name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Show versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Read package info
        id: pkg
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "repo_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Read latest npm version
        id: npm_pkg
        shell: bash
        run: |
          VERSION="$(npm view "${{ steps.pkg.outputs.name }}" version 2>/dev/null || echo "0.0.0")"
          echo "npm_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Decide publish version
        id: decide
        shell: bash
        run: |
          REPO_VERSION="${{ steps.pkg.outputs.repo_version }}"
          NPM_VERSION="${{ steps.npm_pkg.outputs.npm_version }}"

          if [ "$REPO_VERSION" != "$NPM_VERSION" ]; then
            echo "manual_version=true" >> "$GITHUB_OUTPUT"
            echo "publish_version=$REPO_VERSION" >> "$GITHUB_OUTPUT"
          else
            NEXT="$(node -e '
              const [maj, min] = process.argv[1].split(".").map(Number);
              console.log(`${maj}.${min + 1}.0`);
            ' "$NPM_VERSION")"
            echo "manual_version=false" >> "$GITHUB_OUTPUT"
            echo "publish_version=$NEXT" >> "$GITHUB_OUTPUT"
          fi

      - name: Set publish version locally
        shell: bash
        run: |
          npm version "${{ steps.decide.outputs.publish_version }}" --no-git-tag-version --allow-same-version

      - name: Publish with Trusted Publishing
        run: npm publish

      - name: Summary
        shell: bash
        run: |
          if [ "${{ steps.decide.outputs.manual_version }}" = "true" ]; then
            echo "Published manual version: ${{ steps.decide.outputs.publish_version }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Auto-bumped minor and published: ${{ steps.decide.outputs.publish_version }}" >> "$GITHUB_STEP_SUMMARY"
          fi